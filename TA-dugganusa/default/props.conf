[dugganusa:stix]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = "timestamp"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 999999

# CIM Threat Intelligence data model mappings
FIELDALIAS-threat_type = threat_type AS threat_category
FIELDALIAS-indicator = value AS threat_match_value
FIELDALIAS-source = source AS threat_source
FIELDALIAS-confidence = confidence AS threat_confidence
FIELDALIAS-malware = malware_family AS threat_group

[dugganusa:tor:relays]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S
TIME_PREFIX = "snapshotDate"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 30
TRUNCATE = 999999

# Tor relay field extractions
FIELDALIAS-relay_ip = address AS dest_ip
FIELDALIAS-relay_asn = asn AS dest_asn
FIELDALIAS-relay_country = country AS dest_country
FIELDALIAS-relay_org = asnOrg AS dest_org
EVAL-is_exit = if(isExit="true", "yes", "no")
EVAL-is_guard = if(isGuard="true", "yes", "no")
