[dugganusa_report_hit]
is_custom = 1
label = DugganUSA: Report feed hit
description = Report matched DugganUSA indicators back to the feed-efficacy (liveness) axis. Sends ONLY the indicator value — never src/dest/host/user/url.
icon_path = appIcon.png
payload_format = json
python.version = python3
alert.execute.cmd = dugganusa_report_hit.py
alert.execute.cmd.arg.1 = --execute

# Results column holding the matched indicator (IP / domain / URL / hash).
param.indicator_field = indicator
# How your search observed the indicator: blocked | alerted | observed.
param.action = alerted
# Traffic direction relative to your network: inbound | outbound | unknown.
param.direction = inbound
